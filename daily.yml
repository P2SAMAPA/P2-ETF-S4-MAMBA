name: Daily S4/Mamba Engine Run

on:
  schedule:
    - cron: "30 23 * * 1-5"   # 23:30 UTC Mon-Fri
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        window: [126, 252, 504, 1008]
      fail-fast: false

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run window ${{ matrix.window }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python trainer.py --window ${{ matrix.window }}

      - name: Upload shard
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.window }}
          path: shards/shard_${{ matrix.window }}.json
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: train

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all shards
        uses: actions/download-artifact@v4
        with:
          pattern: shard-*
          path: shards
          merge-multiple: true

      - name: Merge shards and upload to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python trainer.py --merge
